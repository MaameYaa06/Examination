<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villa House </title>
    <script src="aframe.min.js"></script>
    <script>
    AFRAME.registerComponent('model-color', {
    schema: {
       color: {type: 'color'}
    },
    init: function() {
       this.el.addEventListener('model-loaded', this.applyColor.bind(this));
    },
    applyColor: function() {
      var color = new THREE.Color(this.data.color);
      this.el.object3D.traverse(function(node) {
          if (!node.isMesh || !node.material) {
            return;
                }
          if (Array.isArray(node.material)) {
            node.material = node.material.map(function(material) {
            var cloned = material.clone();
          if (cloned.color) {
            cloned.color.copy(color);
            }
            return cloned;
            });
            return;
            }
            node.material = node.material.clone();
         if (node.material.color) {
            node.material.color.copy(color);
            }
            });
        }
    });
    window.addEventListener('load', function() {
        var waterVideo = document.querySelector('#water');
        var mansion = document.querySelector('#mansionEntity');
        var sceneContent = document.querySelector('#sceneContent');
        var loadingOverlay = document.querySelector('#loadingOverlay');
        if (mansion && sceneContent) {
            mansion.addEventListener('model-loaded', function() {
                sceneContent.setAttribute('visible', true);
        if (loadingOverlay) {
            loadingOverlay.style.display = 'none';
        }
        // Show controls UI after loading
        var controlsUI = document.querySelector('#controlsUI');
        if (controlsUI) {
            controlsUI.style.display = 'block';
        }
        if (waterVideo) {
            waterVideo.play().catch(function() {});
            document.body.addEventListener('click', function() {
            waterVideo.play().catch(function() {});
        }, { once: true });
     }
        }, { once: true });
        }
    });
      AFRAME.registerComponent('floor-controller', {
      schema: {
        groundFloorY: { type: 'number', default: 2 },
        topFloorY: { type: 'number', default: 12 },
        upKey: { type: 'string', default: 'KeyU' },
        downKey: { type: 'string', default: 'KeyD' }
      },
      init: function() {
        this.isTopFloor = false;
        this.handleKeyDown = this.handleKeyDown.bind(this);
        window.addEventListener('keydown', this.handleKeyDown);
      },
      handleKeyDown: function(event) {
        if (event.code === this.data.upKey) {
          this.goToTopFloor();
        } else if (event.code === this.data.downKey) {
          this.goToGroundFloor();
        }
      },
      goToTopFloor: function() {
        if (!this.isTopFloor) {
          var pos = this.el.getAttribute('position');
          pos.y = this.data.topFloorY;
          this.el.setAttribute('position', pos);
          this.isTopFloor = true;
          console.log('Moved to Top Floor');
        }
      },
      goToGroundFloor: function() {
        if (this.isTopFloor) {
          var pos = this.el.getAttribute('position');
          pos.y = this.data.groundFloorY;
          this.el.setAttribute('position', pos);
          this.isTopFloor = false;
          console.log('Moved to Ground Floor');
        }
      },
      remove: function() {
        window.removeEventListener('keydown', this.handleKeyDown);
      }
    });
    </script>
</head>
